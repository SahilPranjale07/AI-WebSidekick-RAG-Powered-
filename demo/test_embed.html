<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Corp — Client Website Embed Demo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0b0f19;
      color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
    }
    .card {
      max-width: 600px;
      padding: 3rem 2rem;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin-top: 0;
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #9ca3af;
      line-height: 1.6;
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      background-color: rgba(139, 92, 246, 0.1);
      color: #c084fc;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    /* Grid background effect */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="card">
    <div class="badge">Dynamic Script Embed Mock</div>
    <h1>Welcome to Acme Corp</h1>
    <p>This page simulates an external client website. Using the script tag below, any business website can drop in our RAG-powered chat widget. It connects to the running local API to provide live QA search.</p>
  </div>

  <!-- This is the container where the React chatbot mounts -->
  <div id="ai-chat-widget"></div>

  <!-- Load our live Vite local development widget bundle -->
  <script type="module" src="http://localhost:5173/src/main.jsx"></script>
</body>
</html>
